name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: node scripts/check-agent-contract.mjs

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint:agent-contract

      - run: pnpm run typecheck

      - run: pnpm run test:ci

      - run: pnpm run lint

      - run: pnpm run format:check

      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.mjs', '**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - run: pnpm run build

      - run: pnpm exec playwright install --with-deps chromium

      - run: mkdir -p .artifacts

      - run: node scripts/with-env.mjs playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-junit
          path: .artifacts/playwright-junit.xml
          if-no-files-found: ignore
