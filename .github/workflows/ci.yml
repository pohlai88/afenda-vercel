# CI does not spin up Postgres/pgvector by default (path A in AGENTS.md): Vitest uses mocks;
# apply `drizzle` migrations against a real Neon branch locally or in a follow-up job (Neon
# branch per PR / Docker pgvector) if you need DB-backed vector tests in CI.
#
# Turborepo: static analysis runs via `pnpm verify:no-test` (parallel task cache).
# Tests run via sharded Vitest (3 parallel runners) and are merged post-run.
# Optional Remote Cache — add repo secrets TURBO_TOKEN, TURBO_TEAM (see AGENTS.md §2).
#
# Job layout (all run in parallel; wall time = max across the group):
#   lint-check    — lint + typecheck + knip (Turbo-cached)          ~1-2 min
#   vitest-gate   — paths-filter: skip Vitest when no code/test inputs changed
#   test-shards   — 3-shard Vitest matrix, uploads blob artifacts   ~20-30s each
#   merge-coverage — merges blobs + checks coverage thresholds      ~15s
#   e2e           — build + Playwright                              ~4-6 min
# Scale: when tests/unit exceeds ~500 files, add shard 4/4 (docs/testing/erp-test-scale-strategy.md).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Shared env used by every job
env:
  NEXT_TELEMETRY_DISABLED: "1"
  TURBO_TELEMETRY_DISABLED: "1"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: node scripts/check-agent-contract.mjs

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-

      # Second-level cache: ESLint per-file results + tsc incremental build info.
      # When Turbo's task cache misses (new branch, changed inputs), these caches
      # let ESLint and tsc skip individual unchanged files instead of starting cold.
      - uses: actions/cache@v4
        with:
          path: .artifacts
          key: ${{ runner.os }}-artifacts-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-artifacts-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-artifacts-

      # verify:no-test = all Turbo tasks except test:ci (lint, typecheck slices, knip, format).
      # Tests are handled by the sharded test-shards + merge-coverage jobs.
      - run: pnpm verify:no-test

      # Phase 4–6: tsgo pilot + tsc/tsgo parity — tsc remains authority until parity is proven.
      - name: TypeScript native preview (tsgo, non-blocking)
        run: pnpm typecheck:tsgo
        continue-on-error: true

      - name: TypeScript tsc vs tsgo parity (non-blocking)
        run: pnpm typecheck:compare
        continue-on-error: true

  vitest-gate:
    runs-on: ubuntu-latest
    outputs:
      vitest: ${{ steps.filter.outputs.vitest }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            vitest:
              - 'app/**'
              - 'components2/**'
              - 'hooks/**'
              - 'lib/**'
              - 'i18n/**'
              - 'messages/**'
              - 'tests/**'
              - '.config/vitest*.ts'
              - '.config/vitest.*.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'scripts/with-env.mjs'
              - 'scripts/vitest-*.mjs'
              - 'scripts/test-local-shards.mjs'

  test-shards:
    needs: vitest-gate
    if: needs.vitest-gate.outputs.vitest == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: "1/3"
            index: 1
          - shard: "2/3"
            index: 2
          - shard: "3/3"
            index: 3
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # SHARD is expanded by bash: `vitest run ... --shard=1/3` etc.
      # Serial mode applies only on Windows (V8 NTFS file-locking); Linux runs in parallel.
      - name: Run Vitest shard ${{ matrix.shard }}
        env:
          SHARD: ${{ matrix.shard }}
        run: pnpm test:ci:shard

      # Each shard uploads its blob report to a uniquely named artifact.
      # merge-coverage downloads and merges them for the final coverage check.
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: vitest-blob-${{ matrix.index }}
          path: .vitest-reports/
          retention-days: 1

  merge-coverage:
    runs-on: ubuntu-latest
    needs: [vitest-gate, test-shards]
    if: ${{ !cancelled() && needs.vitest-gate.outputs.vitest == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # Download all shard blob reports into .vitest-reports/
      - uses: actions/download-artifact@v4
        with:
          path: .vitest-reports
          pattern: vitest-blob-*
          merge-multiple: true

      # Merge blob reports, regenerate coverage, and enforce thresholds.
      # Exits non-zero if any configured threshold is not met.
      - run: pnpm test:ci:merge

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # Next.js build cache — avoids full rebuild when only non-source files change.
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.mjs', '**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - run: pnpm run build

      # Playwright browser binaries (~130 MB for Chromium). Keyed to pnpm-lock.yaml so
      # the cache only invalidates when the @playwright/test version changes.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - run: mkdir -p .artifacts

      # Explicit --config required: config lives at .config/playwright.config.ts (not repo root).
      # Without it Playwright falls back to defaults, missing webServer, outputDir, retries, reporter.
      - run: node scripts/with-env.mjs playwright test --config .config/playwright.config.ts

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-junit
          path: .artifacts/playwright-junit.xml
          if-no-files-found: ignore
