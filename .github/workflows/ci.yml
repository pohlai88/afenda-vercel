# CI does not spin up Postgres/pgvector by default (path A in AGENTS.md): Vitest uses mocks;
# apply `drizzle` migrations against a real Neon branch locally or in a follow-up job (Neon
# branch per PR / Docker pgvector) if you need DB-backed vector tests in CI.
#
# Turborepo: static analysis + unit tests run via `pnpm verify:ci` (parallel task cache).
# Optional Remote Cache — add repo secrets TURBO_TOKEN, TURBO_TEAM (see AGENTS.md §2).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      TURBO_TELEMETRY_DISABLED: "1"
      # Empty until secrets are configured — local-only Turbo cache still works.
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: node scripts/check-agent-contract.mjs

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-

      - run: pnpm verify:ci

      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.mjs', '**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - run: pnpm run build

      - run: pnpm exec playwright install --with-deps chromium

      - run: mkdir -p .artifacts

      - run: node scripts/with-env.mjs playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-junit
          path: .artifacts/playwright-junit.xml
          if-no-files-found: ignore
