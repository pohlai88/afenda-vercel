# Fast ask-docs quality gate when only documentation content changes.
# Full verify still runs in ci.yml on every PR.
name: Ask docs

on:
  pull_request:
    paths:
      - "content/ask-docs/**"
      - "content/ask-docs/scaffold.manifest.json"
      - "scripts/validate-ask-docs-links.ts"
      - "scripts/lint-ask-docs-prose.mjs"
      - "scripts/lint-ask-docs-quality.mjs"
      - "scripts/ask-docs-check-gate.mjs"
      - "scripts/ask-docs-scaffold-from-manifest.mjs"
      - "scripts/lib/ask-docs-scaffold-manifest.shared.mjs"
      - "tests/fixtures/ask-docs-scaffold-dry-run.manifest.json"
      - "tests/unit/ask-docs/**"
      - "turbo.json"
      - ".config/markdownlint-ask-docs.jsonc"
      - "app/**/ask-docs/**"
      - "lib/ask-docs/**"
      - "source.config.ts"

env:
  NEXT_TELEMETRY_DISABLED: "1"
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  ask-docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-ask-docs-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-${{ hashFiles('content/ask-docs/**') }}
          restore-keys: |
            ${{ runner.os }}-turbo-ask-docs-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-

      - run: pnpm ask-docs:validate-manifest

      - run: pnpm ask-docs:scaffold -- --dry-run

      - run: pnpm ask-docs:scaffold:dry-run

      - run: pnpm ask-docs:check
